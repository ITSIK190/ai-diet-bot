<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
</head>
<body>
    <h1>Edit Profile</h1>

    <form action="/update_user" method="POST" id="profile-form">
        <input type="hidden" name="user_id" value="{{ user_id }}">

        <label for="user_name">Name:</label>
        <input type="text" id="user_name" name="name" value="{{ user_name }}"><br><br>

        <label for="diet_type">Diet Type:</label>
        <input type="text" id="diet_type" name="diet" value="{{ diet_type }}"><br><br>

        <label for="weight">Weight (kg):</label>
        <input type="number" id="weight" name="weight" value="{{ weight }}"><br><br>

        <label for="goal_weight">Goal Weight (kg):</label>
        <input type="number" id="goal_weight" name="goal" value="{{ goal_weight }}"><br><br>

        <label for="meals_per_day">Meals per day:</label>
        <input type="number" id="meals_per_day" name="meals_per_day" value="{{ meals_per_day }}"><br><br>

        <label for="fasting_start">Fasting Start:</label>
        <input type="time" id="fasting_start" name="fasting_start" value="{{ fasting_start }}"><br><br>

        <label for="fasting_end">Fasting End:</label>
        <input type="time" id="fasting_end" name="fasting_end" value="{{ fasting_end }}"><br><br>

        <button type="submit">Update Profile</button>
    </form>

    <script>
        // Simple form submission handling
        document.getElementById("profile-form").onsubmit = async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            const response = await fetch("/update_user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(data),
            });

            const result = await response.json();
            alert(result.message || result.error);
        };
    </script>
</body>
</html>
