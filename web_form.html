<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
</head>
<body>
    <form id="profile-form">
        <label for="weight">Weight (kg):</label>
        <input type="text" id="weight" name="weight" />

        <label for="goal">Goal (kg):</label>
        <input type="text" id="goal" name="goal" />

        <label for="diet">Diet:</label>
        <input type="text" id="diet" name="diet" />

        <label for="fasting">Fasting:</label>
        <input type="checkbox" id="fasting" name="fasting" />

        <label for="meals_per_day">Meals per day:</label>
        <input type="number" id="meals_per_day" name="meals_per_day" />

        <label for="eating_window_start">Eating window start:</label>
        <input type="time" id="eating_window_start" name="eating_window_start" />

        <label for="eating_window_stop">Eating window stop:</label>
        <input type="time" id="eating_window_stop" name="eating_window_stop" />

        <button type="button" onclick="saveProfile()">Save Profile</button>
    </form>

    <script>
        async function loadProfile() {
            const userId = "USER_ID_PLACEHOLDER";  // Injected by backend

            if (!userId) {
                alert("Error: User ID missing!");
                return;
            }

            try {
                const response = await fetch(`https://ai-diet-bot-production.up.railway.app/get_user?user_id=${userId}`);
                
                if (!response.ok) throw new Error(`API error: ${response.status}`);

                const userData = await response.json();

                // Check if response contains expected data
                if (!userData || Object.keys(userData).length === 0) {
                    alert("No user data found.");
                    return;
                }

                // Prefill form safely
                document.getElementById("weight").value = userData.weight || "";  // Matches the JSON key `weight`
                document.getElementById("goal").value = userData.goal || "";  // Matches the JSON key `goal`

                // The following fields do not exist in your JSON, so you may either remove them or handle them differently.
                document.getElementById("diet").value = userData.diet || "";  // Matches the JSON key `diet`
                document.getElementById("fasting").checked = userData.fasting || false;  // Matches the JSON key `fasting`
                document.getElementById("meals_per_day").value = userData.meals_per_day || "";  // Matches the JSON key `meals_per_day`
                document.getElementById("eating_window_start").value = userData.eating_window?.start || "";  // Matches `eating_window.start`
                document.getElementById("eating_window_stop").value = userData.eating_window?.stop || "";  // Matches `eating_window.stop`

            } catch (error) {
                console.error("Failed to load user profile:", error);
                alert("Failed to load profile. Please check your connection.");
            }
        }

        async function saveProfile() {
            const userId = "USER_ID_PLACEHOLDER";  // Injected by backend

            const data = {
                user_id: userId,
                weight_kg: document.getElementById("weight").value,
                goal: document.getElementById("goal").value,
                diet: document.getElementById("diet").value,
                fasting: document.getElementById("fasting").checked,
                meals_per_day: document.getElementById("meals_per_day").value,
                eating_window: {
                    start: document.getElementById("eating_window_start").value,
                    stop: document.getElementById("eating_window_stop").value
                }
            };

            try {
                const response = await fetch("https://ai-diet-bot-production.up.railway.app/update_user", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error(`API error: ${response.status}`);

                alert("Profile updated successfully!");
            } catch (error) {
                console.error("Failed to update profile:", error);
                alert("Failed to update profile. Please try again.");
            }
        }

        // Ensure profile loads after DOM is ready
        window.addEventListener("DOMContentLoaded", loadProfile);
    </script>
</body>
</html>
