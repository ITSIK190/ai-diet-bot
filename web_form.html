<!DOCTYPE html>
<html>
<head>
    <title>Test API Gateway</title>
    <script>
        async function testGateway() {
            const userId = 1; // Replace with an actual user_id or get from URL query parameters
            const response = await fetch(`http://localhost:5000/get_user?user_id=${userId}`);
            if (response.ok) {
                const data = await response.json();
                document.getElementById("result").textContent = JSON.stringify(data, null, 2);
            } else {
                document.getElementById("result").textContent = `Error: ${response.statusText}`;
            }
        }
    </script>
</head>
<body onload="testGateway()">
    <h2>Test API Gateway</h2>
    <pre id="result">Loading...</pre>
</body>
</html>
