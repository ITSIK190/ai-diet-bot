<script>
    async function loadProfile() {
        const userId = "USER_ID_PLACEHOLDER";  // Injected by backend

        if (!userId) {
            alert("Error: User ID missing!");
            return;
        }

        try {
            const response = await fetch(`https://ai-diet-bot-production.up.railway.app/get_user?user_id=${userId}`);
            
            if (!response.ok) throw new Error(`API error: ${response.status}`);

            const userData = await response.json();

            // Check if response contains expected data
            if (!userData || Object.keys(userData).length === 0) {
                alert("No user data found.");
                return;
            }

            // Prefill form safely
            document.getElementById("weight").value = userData.weight_kg || "";
            document.getElementById("height").value = userData.height_cm || "";
            document.getElementById("age").value = userData.age || "";
            document.getElementById("gender").value = userData.gender || "";
            document.getElementById("activity").value = userData.activity || "";
            document.getElementById("goal").value = userData.goal || "";

        } catch (error) {
            console.error("Failed to load user profile:", error);
            alert("Failed to load profile. Please check your connection.");
        }
    }

    async function saveProfile() {
        const userId = "USER_ID_PLACEHOLDER";  // Injected by backend

        const data = {
            user_id: userId,
            weight_kg: document.getElementById("weight").value || null,
            height_cm: document.getElementById("height").value || null,
            age: document.getElementById("age").value || null,
            gender: document.getElementById("gender").value || null,
            activity: document.getElementById("activity").value || null,
            goal: document.getElementById("goal").value || null
        };

        try {
            const response = await fetch("https://ai-diet-bot-production.up.railway.app/update_user", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            if (!response.ok) throw new Error(`API error: ${response.status}`);

            alert("Profile updated successfully!");
        } catch (error) {
            console.error("Failed to update profile:", error);
            alert("Failed to update profile. Please try again.");
        }
    }

    // Ensure profile loads after DOM is ready
    window.addEventListener("DOMContentLoaded", loadProfile);
</script>
