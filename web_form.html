<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <script>
        async function loadProfile() {
            const userId = new URLSearchParams(window.location.search).get("user_id");

            if (!userId) {
                alert("User ID missing!");
                return;
            }

            // Fetch existing data
            const response = await fetch(`https://localhost:5000/get_user?user_id=${userId}`);
            const userData = await response.json();

            // Prefill form
            document.getElementById("weight").value = userData.weight_kg || "";
            document.getElementById("height").value = userData.height_cm || "";
            document.getElementById("age").value = userData.age || "";
            document.getElementById("gender").value = userData.gender || "";
            document.getElementById("activity").value = userData.activity || "";
            document.getElementById("goal").value = userData.goal || "";
        }

        async function saveProfile() {
            const userId = new URLSearchParams(window.location.search).get("user_id");

            const data = {
                user_id: userId,
                weight_kg: document.getElementById("weight").value,
                height_cm: document.getElementById("height").value,
                age: document.getElementById("age").value,
                gender: document.getElementById("gender").value,
                activity: document.getElementById("activity").value,
                goal: document.getElementById("goal").value
            };

            // Send data to backend
            await fetch("https://localhost:5000/update_user", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            alert("Profile updated!");
        }
    </script>
</head>
<body onload="loadProfile()">
    <h2>Edit Your Profile</h2>
    <form>
        <label>Weight (kg):</label> <input type="number" id="weight"><br>
        <label>Height (cm):</label> <input type="number" id="height"><br>
        <label>Age:</label> <input type="number" id="age"><br>
        <label>Gender:</label>
        <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select><br>
        <label>Activity Level:</label>
        <select id="activity">
            <option value="sedentary">Sedentary</option>
            <option value="light">Light</option>
            <option value="moderate">Moderate</option>
            <option value="active">Active</option>
            <option value="very active">Very Active</option>
        </select><br>
        <label>Goal Weight (kg):</label> <input type="number" id="goal"><br>
        <button type="button" onclick="saveProfile()">Save</button>
    </form>
</body>
</html>
