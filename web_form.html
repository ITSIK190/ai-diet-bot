<script>
    async function loadProfile() {
        const userId = "USER_ID_PLACEHOLDER";  // Injected by backend

        if (!userId) {
            alert("User ID missing!");
            return;
        }

        // Fetch existing data
        const response = await fetch(`https://ai-diet-bot-production.up.railway.app/get_user?user_id=${userId}`);
        const userData = await response.json();

        // Prefill form
        document.getElementById("weight").value = userData.weight_kg || "";
        document.getElementById("height").value = userData.height_cm || "";
        document.getElementById("age").value = userData.age || "";
        document.getElementById("gender").value = userData.gender || "";
        document.getElementById("activity").value = userData.activity || "";
        document.getElementById("goal").value = userData.goal || "";
    }

    async function saveProfile() {
        const userId = "USER_ID_PLACEHOLDER";  // Injected by backend

        const data = {
            user_id: userId,
            weight_kg: document.getElementById("weight").value,
            height_cm: document.getElementById("height").value,
            age: document.getElementById("age").value,
            gender: document.getElementById("gender").value,
            activity: document.getElementById("activity").value,
            goal: document.getElementById("goal").value
        };

        // Send data to backend
        await fetch("https://ai-diet-bot-production.up.railway.app/update_user", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        alert("Profile updated!");
    }
</script>
